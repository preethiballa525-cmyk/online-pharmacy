```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="form-box">

        <h2><i class="fa-solid fa-user-graduate"></i> Student Registration</h2>
        <p class="subtitle">Fill in your details to register</p>

        <form id="registrationForm">

            <!-- Full Name -->
            <div class="input-box">
                <label>Full Name</label>
                <div class="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fullname" placeholder="Enter Full Name">
                </div>
                <span class="error" id="nameError"></span>
            </div>

            <!-- Roll Number -->
            <div class="input-box">
                <label>Roll Number</label>
                <div class="input-field">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="rollno" placeholder="Enter Roll Number">
                </div>
                <span class="error" id="rollError"></span>
            </div>

            <!-- Email -->
            <div class="input-box">
                <label>Email ID</label>
                <div class="input-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter Email">
                </div>
                <span class="error" id="emailError"></span>
            </div>

            <!-- Mobile -->
            <div class="input-box">
                <label>Mobile Number</label>
                <div class="input-field">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" id="mobile" placeholder="Enter Mobile Number">
                </div>
                <span class="error" id="mobileError"></span>
            </div>

            <!-- Password -->
            <div class="input-box">
                <label>Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter Password">
                </div>
                <span class="error" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="input-box">
                <label>Confirm Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                </div>
                <span class="error" id="confirmError"></span>
            </div>

            <!-- Gender -->
            <div class="input-box">
                <label>Gender</label>

                <div class="gender-box">
                    <label><input type="radio" name="gender" value="Male"> Male</label>

                    <label><input type="radio" name="gender" value="Female"> Female</label>

                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>

                <span class="error" id="genderError"></span>
            </div>

            <!-- Department -->
            <div class="input-box">
                <label>Department</label>

                <select id="department">
                    <option value="">Select Department</option>
                    <option>Information Technology</option>
                    <option>Computer Science Engineering</option>
                    <option>Electronics & Communication</option>
                    <option>Electrical Engineering</option>
                    <option>Mechanical Engineering</option>
                    <option>Civil Engineering</option>
                </select>

                <span class="error" id="departmentError"></span>
            </div>

            <!-- Date of Birth -->
            <div class="input-box">
                <label>Date of Birth</label>

                <input type="date" id="dob">

                <span class="error" id="dobError"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn">
                <i class="fa-solid fa-paper-plane"></i>
                Register
            </button>

            <p id="successMessage"></p>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
```
